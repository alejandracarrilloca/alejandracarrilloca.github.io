<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CV - Alejandra Carrillo-Carlos</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>

<link
  href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: #ffffff;
  color: #000000;
  line-height: 1.6;
  font-size: 1.15rem;
}

a {
  color: #59a3d4;
  text-decoration: underline;
}

/* ---------------- NAVBAR ---------------- */

nav#nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #ffffff;
  border-bottom: 1px solid #dcdcdc;
  z-index: 100;
  padding: 1rem 2rem;
}

nav#nav ul {
  display: flex;
  justify-content: space-between;
  align-items: center;
  list-style: none;
}

.logo a {
  color: #000000;
  text-decoration: none;
  font-size: 1.3rem;
  font-weight: 700;
}

.menu {
  display: flex;
  gap: 2.5rem;
  font-size: 1.15rem;
}

.menu a {
  color: #000000;
  text-decoration: none;
  font-weight: 600;
  border-bottom: 2px solid transparent;
  padding-bottom: 0.25rem;
  transition:
    color 0.2s ease,
    border-color 0.2s ease;
}

.menu a:hover {
  color: #F5277D;
  border-color: #F5277D;
}

/* ---------------- PAGE LAYOUT ---------------- */

#top {
  display: flex;
  gap: 4rem;
  margin: 3rem 10rem;
  flex-wrap: wrap;
}

/* ---------------- PROFILE ---------------- */

.profile {
  position: fixed;
  top: 9rem;
  left: 6rem;
  width: 285px;
  text-align: center;
  z-index: 10;
}

.profile img {
  width: 190px;
  height: 190px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 0.9rem;
}

.profile h2 {
  font-size: 1.15rem;
  line-height: 1.3;
  margin-bottom: 0.25rem;
}

.profile p {
  font-size: 0.95rem;
  line-height: 1.4;
  color: #666666;
}

.profile hr {
  width: 70%;
  margin: 0.8rem auto 1rem;
  border: none;
  border-top: 1px solid #e3e3e3;
}

/* ---------------- CONTACT BUTTONS ---------------- */

.contact-cards {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 1rem;
}

.contact-card {
  min-height: 42px;
  padding: 0.55rem 0.7rem;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

  border: 1px solid #d7d7d7;
  border-radius: 11px;
  background: #fafafa;

  color: #444444;
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 600;
  line-height: 1.2;
  text-align: center;

  transition:
    background 0.2s ease,
    border-color 0.2s ease,
    color 0.2s ease,
    transform 0.2s ease,
    box-shadow 0.2s ease;
}

.contact-card:hover {
  background: #f1f1f1;
  border-color: #999999;
  color: #000000;
  transform: translateY(-2px);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.08);
}

.contact-card i {
  color: #666666;
  font-size: 1rem;
  flex-shrink: 0;
}

.contact-card:hover i {
  color: #000000;
}

/* ---------------- MAIN CONTENT ---------------- */

.text {
  flex: 1;
  min-width: 300px;
  max-width: 900px;
  margin-left: 300px;
}

.text header h1 {
  font-size: 1.45rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  border-bottom: 2px solid #000000;
  padding-bottom: 0.3rem;
}

/* ---------------- CV HEADER ---------------- */

.cv-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  margin: 1rem 0;
}

.cv-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

  padding: 0.55rem 0.9rem;
  border: 1px solid #d7d7d7;
  border-radius: 10px;
  background: #fafafa;

  color: #444444;
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 600;

  transition:
    background 0.2s ease,
    border-color 0.2s ease,
    color 0.2s ease,
    transform 0.2s ease,
    box-shadow 0.2s ease;
}

.cv-button:hover {
  background: #f1f1f1;
  border-color: #999999;
  color: #000000;
  transform: translateY(-2px);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.08);
}

/* ---------------- CV VIEWER ---------------- */

.cv-container {
  width: 100%;
  margin-top: 1rem;
  border: 1px solid #d7d7d7;
  border-radius: 12px;
  overflow: hidden;
  background: #fafafa;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
}

.cv-frame {
  display: block;
  width: 100%;
  height: 1100px;
  border: none;
  background: #ffffff;
}

/* ---------------- MOBILE ---------------- */

@media (max-width: 700px) {

  nav#nav {
    padding: 0.9rem 1rem;
  }

  nav#nav ul {
    flex-direction: column;
    gap: 0.8rem;
  }

  .menu {
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.8rem 1rem;
    font-size: 1rem;
  }

  #top {
    flex-direction: column;
    margin: 9.5rem 1.5rem 2rem;
  }

  .profile {
    position: static;
    width: 100%;
    margin-bottom: 2rem;
  }

  .profile img {
    width: 180px;
    height: 180px;
  }

  .contact-cards {
    max-width: 320px;
    margin: 1rem auto 0;
  }

  .text {
    margin-left: 0;
  }

  .cv-actions {
    justify-content: center;
    flex-wrap: wrap;
  }

  .cv-frame {
    height: 80vh;
  }
}

@media (max-width: 430px) {

  .contact-cards {
    grid-template-columns: 1fr;
    max-width: 260px;
  }

  .cv-actions {
    flex-direction: column;
  }

  .cv-button {
    width: 100%;
  }
}

</style>
</head>

<body>

<nav id="nav">
  <ul>

    <li class="logo">
      <a href="index.html">Alejandra Carrillo</a>
    </li>

    <div class="menu">
      <li><a href="Cv.html">CV</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="publications.html">Publications</a></li>
      <li><a href="talks.html">Talks</a></li>
      <li><a href="portfolio.html">Gallery</a></li>
    </div>

  </ul>
</nav>

<section id="top">

  <aside class="profile">

    <img
      src="tu-foto.jpg"
      alt="Portrait of Alejandra Carrillo-Carlos"
    />

    <h2>Alejandra Carrillo-Carlos</h2>

    <p>
      <strong>B.S. Student in Genomic Sciences</strong>
    </p>

    <hr>

    <div class="contact-cards">

      <a
        class="contact-card"
        href="mailto:alecarrillocarlos@gmail.com"
      >
        <i class="fas fa-envelope"></i>
        <span>Email</span>
      </a>

      <a
        class="contact-card"
        href="Cv.html"
      >
        <i class="fas fa-file-lines"></i>
        <span>CV</span>
      </a>

      <a
        class="contact-card"
        href="https://github.com/alejandracarrilloca"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fab fa-github"></i>
        <span>GitHub</span>
      </a>

      <a
        class="contact-card"
        href="https://scholar.google.com/citations?user=N4IRuzUAAAAJ&hl=en"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fas fa-graduation-cap"></i>
        <span>Scholar</span>
      </a>

      <a
        class="contact-card"
        href="https://www.linkedin.com/in/alejandracarrilloca/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fab fa-linkedin"></i>
        <span>LinkedIn</span>
      </a>

      <a
        class="contact-card"
        href="https://orcid.org/0009-0009-2252-3965"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fab fa-orcid"></i>
        <span>ORCID</span>
      </a>

    </div>

  </aside>

  <main class="text">

    <header>
      <h1>Curriculum Vitae</h1>
    </header>

    <div class="cv-actions">

      <a
        class="cv-button"
        href="https://docs.google.com/document/d/11rNzEUWYi9gJmdwOXPHx9ePf7SE6O6hmMjXRW_xknSw/edit"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fas fa-arrow-up-right-from-square"></i>
        Open CV
      </a>

    </div>

    <div class="cv-container">

      <iframe
        src="https://docs.google.com/document/d/11rNzEUWYi9gJmdwOXPHx9ePf7SE6O6hmMjXRW_xknSw/preview"
        class="cv-frame"
        title="Alejandra Carrillo-Carlos Curriculum Vitae"
        loading="lazy"
        allowfullscreen>
      </iframe>

    </div>

  </main>

</section>

</body>
</html>
